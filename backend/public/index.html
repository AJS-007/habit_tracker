<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Backend Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --text: #f8fafc;
            --accent: #38bdf8;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: float 20s infinite alternate;
            opacity: 0.4;
        }

        @keyframes float {
            0% { transform: translate(-20%, -20%) scale(1); }
            100% { transform: translate(20%, 20%) scale(1.2); }
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 90%;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.25rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(56, 189, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }

        .api-list {
            margin-top: 2rem;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .api-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: transform 0.2s, background 0.2s;
        }

        .api-item:hover {
            transform: translateX(10px);
            background: rgba(255, 255, 255, 0.08);
        }

        .method {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            min-width: 60px;
            text-align: center;
        }

        .method.get { background: #10b98122; color: #10b981; }
        .method.post { background: #3b82f622; color: #3b82f6; }
        .method.put { background: #f59e0b22; color: #f59e0b; }
        .method.delete { background: #ef444422; color: #ef4444; }

        .path {
            font-family: monospace;
            color: var(--accent);
            flex: 1;
        }

        .desc {
            font-size: 0.875rem;
            color: #94a3b8;
        }

        code {
            background: rgba(0, 0, 0, 0.3);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="blob"></div>
    <div class="container">
        <div class="status">
            <span class="pulse"></span>
            System Active
        </div>
        <h1>Server Online</h1>
        <p>Welcome to your high-performance backend service.</p>
        
        <div class="api-list">
            <div class="api-item">
                <span class="method get">GET</span>
                <span class="path">/users</span>
                <span class="desc">Retrieve all users</span>
            </div>
            <div class="api-item">
                <span class="method post">POST</span>
                <span class="path">/users</span>
                <span class="desc">Create new user (JSON body: <code>{"name": "..."}</code>)</span>
            </div>
            <div class="api-item">
                <span class="method put">PUT</span>
                <span class="path">/users/:id</span>
                <span class="desc">Update user (JSON body: <code>{"name": "..."}</code>)</span>
            </div>
            <div class="api-item">
                <span class="method delete">DELETE</span>
                <span class="path">/users/:id</span>
                <span class="desc">Remove user by ID</span>
            </div>
        </div>
    </div>
</body>
</html>
