services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: habitflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/config/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/habitflow
      JWT_SECRET: habitflow-super-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3000
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    restart: always

volumes:
  pgdata:
